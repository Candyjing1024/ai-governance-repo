<!-- Sticky Top Bar -->
<nav class="topbar navbar navbar-dark bg-dark px-3">
  <div class="d-flex align-items-center">
    <button class="btn btn-outline-light btn-sm me-3" (click)="toggleSidebar()">
      <i class="bi" [class.bi-list]="sidebarCollapsed()" [class.bi-x-lg]="!sidebarCollapsed()"></i>
    </button>
    <a class="navbar-brand mb-0 d-flex align-items-center" routerLink="/">
      <i class="bi bi-cpu me-2"></i>
      <span>AI Studio</span>
    </a>
  </div>
  <div class="d-flex align-items-center">
    <span class="text-light me-3">
      <i class="bi bi-person-circle me-1"></i>
      {{ authService.user()?.displayName }}
    </span>
    <button class="btn btn-outline-light btn-sm" (click)="authService.logout()">
      <i class="bi bi-box-arrow-right me-1"></i> Logout
    </button>
  </div>
</nav>

<!-- Sidebar + Content area -->
<div class="app-body">
  <!-- Left Sidebar -->
  <aside class="sidebar bg-dark" [class.collapsed]="sidebarCollapsed()">
    <nav class="nav flex-column pt-2">
      @for (item of menuItems; track item.route) {
        <a
          class="nav-link text-light sidebar-link"
          [routerLink]="item.route"
          routerLinkActive="active"
        >
          <i class="bi {{ item.icon }} me-2"></i>
          @if (!sidebarCollapsed()) {
            <span>{{ item.label }}</span>
          }
        </a>
      }
    </nav>
  </aside>

  <!-- Scrollable Center Content -->
  <main class="content-area" [class.expanded]="sidebarCollapsed()">
    <div class="container-fluid p-4">
      <router-outlet />
    </div>
  </main>
</div>
